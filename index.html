<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Comprehension Answer Key</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            color: #0f172a;
        }
        .passage-text {
            font-family: 'Merriweather', serif;
            line-height: 1.8;
            color: #334155;
        }
        .highlight-transition {
            transition: background-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
            border-radius: 4px;
        }
        .highlight-active-q1 { background-color: #fef08a; box-shadow: 0 0 0 2px #fef08a; color: #854d0e; }
        .highlight-active-q2 { background-color: #bbf7d0; box-shadow: 0 0 0 2px #bbf7d0; color: #166534; }
        .highlight-active-q3 { background-color: #bfdbfe; box-shadow: 0 0 0 2px #bfdbfe; color: #1e40af; }
        
        .tab-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-btn.active { 
            background-color: #4f46e5; 
            color: white; 
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3), 0 2px 4px -1px rgba(79, 70, 229, 0.06);
            transform: translateY(-2px);
        }
        
        .answer-card { transition: all 0.3s ease; }
        .answer-card.active-q1 { border-color: #eab308; box-shadow: 0 10px 15px -3px rgba(234, 179, 8, 0.15); ring: 2px solid #fef08a; }
        .answer-card.active-q2 { border-color: #22c55e; box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.15); ring: 2px solid #bbf7d0; }
        .answer-card.active-q3 { border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.15); ring: 2px solid #bfdbfe; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const passagesData = {
            passage1: {
                title: "Passage 1: European Coffeehouses",
                referTo: [
                    { id: 1, word: `"it" (Para A)`, answer: "The bitter drink / coffee" },
                    { id: 2, word: `"them" (Para B)`, answer: "These men / patrons (politicians, writers, merchants)" },
                    { id: 3, word: `"This furniture" (Para C)`, answer: "A large communal table" }
                ],
                questions: [
                    {
                        id: "q1",
                        theme: "q1",
                        question: "How did the environment and primary beverage of 17th-century coffeehouses influence the types of interactions that took place there?",
                        modelAnswer: "The coffeehouses provided an alcohol-free atmosphere where people drank coffee. This helped customers stay awake and pay attention, which allowed them to have meaningful and deep discussions instead of just socializing.",
                        colorClass: "active-q1",
                        iconColor: "text-yellow-500",
                        bgColor: "bg-yellow-50"
                    },
                    {
                        id: "q2",
                        theme: "q2",
                        question: "In what ways did London coffeehouses function as a \"democratic space\" for their patrons?",
                        modelAnswer: "They were democratic because a person's social status wasn't important; what mattered most was how well they could debate an idea. Also, everyone had equal access to information because newspapers were given out for free.",
                        colorClass: "active-q2",
                        iconColor: "text-green-500",
                        bgColor: "bg-green-50"
                    },
                    {
                        id: "q3",
                        theme: "q3",
                        question: "Explain the significance of the communal table in European coffeehouses and how it impacted the spread of knowledge.",
                        modelAnswer: "The large table brought people together to share their thoughts in one central place. It helped spread knowledge because professionals, like scientists and businessmen, used it to discuss new findings and make agreements with each other.",
                        colorClass: "active-q3",
                        iconColor: "text-blue-500",
                        bgColor: "bg-blue-50"
                    }
                ],
                renderText: (activeQ) => (
                    <div className="space-y-6 passage-text text-lg">
                        <p><span className="font-bold text-indigo-400 font-sans mr-2">[A]</span>
                            During the 17th century, coffeehouses emerged across Europe as vibrant centers of social and intellectual life. Unlike traditional taverns that served alcohol, these new establishments <span className={`highlight-transition ${activeQ === 'q1' ? 'highlight-active-q1' : ''}`}>offered a sober environment fueled by coffee</span>. While the bitter drink was initially met with suspicion, it quickly gained popularity, <span className={`highlight-transition ${activeQ === 'q1' ? 'highlight-active-q1' : ''}`}>keeping patrons alert and focused for deep conversations</span>.
                        </p>
                        <p><span className="font-bold text-indigo-400 font-sans mr-2">[B]</span>
                            These lively venues were often divided by the type of clientele they attracted. In London, politicians, writers, and merchants would gather at specific coffeehouses to debate the news of the day. For these men, the coffeehouse represented a democratic space where <span className={`highlight-transition ${activeQ === 'q2' ? 'highlight-active-q2' : ''}`}>social class mattered less than one's ability to argue a point</span>. To ensure everyone could participate, <span className={`highlight-transition ${activeQ === 'q2' ? 'highlight-active-q2' : ''}`}>newspapers were freely distributed among them</span>.
                        </p>
                        <p><span className="font-bold text-indigo-400 font-sans mr-2">[C]</span>
                            The central feature of these spaces was a large communal table. This simple wooden furniture <span className={`highlight-transition ${activeQ === 'q3' ? 'highlight-active-q3' : ''}`}>served as the focal point for exchanging ideas</span>. It was here that <span className={`highlight-transition ${activeQ === 'q3' ? 'highlight-active-q3' : ''}`}>scientists shared their latest discoveries and businessmen negotiated trade deals</span>.
                        </p>
                        <p><span className="font-bold text-indigo-400 font-sans mr-2">[D]</span>
                            For ordinary citizens, smaller neighborhood coffee shops were less glamorous, but they served a similar purpose. Even if these shops were small and noisy, they provided a vital space for community connection.
                        </p>
                    </div>
                )
            },
            passage2: {
                title: "Passage 2: Japanese Ryokan",
                referTo: [
                    { id: 1, word: `"they" (Para A)`, answer: "These lightweight materials (wood, bamboo, and paper)" },
                    { id: 2, word: `"them" (Para B)`, answer: "Guests" },
                    { id: 3, word: `"This versatile piece..." (Para C)`, answer: "A low wooden table" }
                ],
                questions: [
                    {
                        id: "q1",
                        theme: "q1",
                        question: "How do the building materials of an authentic ryokan contribute to its overall atmosphere and connection to its surroundings?",
                        modelAnswer: "Because ryokans are made completely of natural things like wood and bamboo, they perfectly match the nature around them. This creates a peaceful and harmonious atmosphere for the guests to relax in.",
                        colorClass: "active-q1",
                        iconColor: "text-yellow-500",
                        bgColor: "bg-yellow-50"
                    },
                    {
                        id: "q2",
                        theme: "q2",
                        question: "Describe the physical transitions a guest makes when entering a ryokan, and explain the purpose of these architectural features.",
                        modelAnswer: "When guests enter, they must first take off their shoes at the entrance to keep the soft tatami mats clean. Then, heavy sliding doors are used to block out the outside noise, keeping the inside very quiet and relaxing.",
                        colorClass: "active-q2",
                        iconColor: "text-green-500",
                        bgColor: "bg-green-50"
                    },
                    {
                        id: "q3",
                        theme: "q3",
                        question: "How does the lack of permanent furniture in a ryokan guest room enhance its functionality throughout the day?",
                        modelAnswer: "Having almost no fixed furniture makes the rooms very flexible. This means the exact same room can be easily changed and used for different activities, like eating dinner or sleeping, at different times of the day.",
                        colorClass: "active-q3",
                        iconColor: "text-blue-500",
                        bgColor: "bg-blue-50"
                    }
                ],
                renderText: (activeQ) => (
                    <div className="space-y-6 passage-text text-lg">
                        <p><span className="font-bold text-indigo-400 font-sans mr-2">[A]</span>
                            For centuries, traditional Japanese inns known as ryokans have offered travelers a unique blend of minimalist design, harmony with nature, and exceptional hospitality. Unlike modern concrete hotels, most authentic ryokans are <span className={`highlight-transition ${activeQ === 'q1' ? 'highlight-active-q1' : ''}`}>built entirely of natural materials like wood, bamboo, and paper</span>. While these lightweight materials require constant maintenance, they also <span className={`highlight-transition ${activeQ === 'q1' ? 'highlight-active-q1' : ''}`}>allow the structure to blend seamlessly with the surrounding environment</span>.
                        </p>
                        <p><span className="font-bold text-indigo-400 font-sans mr-2">[B]</span>
                            A classic ryokan is carefully arranged to separate the bustling outside world from the tranquil interior. The entryway, or genkan, is where guests <span className={`highlight-transition ${activeQ === 'q2' ? 'highlight-active-q2' : ''}`}>remove their shoes before stepping onto the soft tatami mat floors</span>. To preserve this serene environment, <span className={`highlight-transition ${activeQ === 'q2' ? 'highlight-active-q2' : ''}`}>thick sliding doors called fusuma isolate them from the noise</span> of the main hallways.
                        </p>
                        <p><span className="font-bold text-indigo-400 font-sans mr-2">[C]</span>
                            In the heart of the guest room is a low wooden table. This versatile piece of furniture serves as the center of the guest's stay. The rooms themselves are designed to be <span className={`highlight-transition ${activeQ === 'q3' ? 'highlight-active-q3' : ''}`}>highly adaptable; they contain very little permanent furniture</span>.
                        </p>
                    </div>
                )
            }
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('passage1');
            const [activeHighlight, setActiveHighlight] = useState(null);

            const currentData = passagesData[activeTab];

            // Reset highlight when switching tabs
            const handleTabSwitch = (tab) => {
                setActiveTab(tab);
                setActiveHighlight(null);
            };

            const toggleHighlight = (id) => {
                setActiveHighlight(prev => prev === id ? null : id);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-800 tracking-tight flex items-center">
                                    <i className="fas fa-check-double text-indigo-600 mr-3"></i>
                                    Reading Answer Key
                                </h1>
                                <p className="text-sm text-slate-500 mt-1 font-medium tracking-wide uppercase">Teacher Edition &bull; Model Answers</p>
                            </div>
                            
                            {/* Tabs */}
                            <div className="flex bg-slate-100 p-1 rounded-xl shadow-inner">
                                <button 
                                    onClick={() => handleTabSwitch('passage1')}
                                    className={`tab-btn px-6 py-2.5 rounded-lg text-sm font-bold tracking-wide ${activeTab === 'passage1' ? 'active' : 'text-slate-600 hover:text-indigo-600'}`}
                                >
                                    <i className="fas fa-coffee mr-2"></i> Coffeehouses
                                </button>
                                <button 
                                    onClick={() => handleTabSwitch('passage2')}
                                    className={`tab-btn px-6 py-2.5 rounded-lg text-sm font-bold tracking-wide ${activeTab === 'passage2' ? 'active' : 'text-slate-600 hover:text-indigo-600'}`}
                                >
                                    <i className="fas fa-home mr-2"></i> Ryokan
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
                        
                        <div className="mb-8 border-b-2 border-slate-200 pb-4">
                            <h2 className="text-3xl font-extrabold text-slate-800">{currentData.title}</h2>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                            
                            {/* Left Column: The Text */}
                            <div className="lg:col-span-6 xl:col-span-7 bg-white rounded-2xl p-8 shadow-sm border border-slate-200 lg:sticky lg:top-24">
                                <div className="flex items-center justify-between mb-6">
                                    <h3 className="text-lg font-bold text-slate-800 uppercase tracking-widest flex items-center">
                                        <i className="fas fa-book-open text-indigo-400 mr-2"></i> Original Text
                                    </h3>
                                    {activeHighlight && (
                                        <span className="text-xs font-bold bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full animate-pulse">
                                            Evidence Highlighted
                                        </span>
                                    )}
                                </div>
                                
                                {currentData.renderText(activeHighlight)}
                                
                            </div>

                            {/* Right Column: Answers */}
                            <div className="lg:col-span-6 xl:col-span-5 space-y-6">
                                
                                {/* Refer-To Section */}
                                <div className="bg-slate-800 rounded-2xl p-6 shadow-md text-white">
                                    <h3 className="text-sm font-bold text-indigo-300 uppercase tracking-widest mb-4 flex items-center">
                                        <i className="fas fa-link mr-2"></i> Part I: Refer-To
                                    </h3>
                                    <ul className="space-y-3">
                                        {currentData.referTo.map(item => (
                                            <li key={item.id} className="flex flex-col sm:flex-row sm:items-baseline bg-slate-700/50 rounded-lg p-3 border border-slate-600">
                                                <span className="font-mono text-sm text-slate-300 sm:w-1/3 mb-1 sm:mb-0">{item.id}. {item.word}</span>
                                                <span className="font-bold text-emerald-400 sm:w-2/3"><i className="fas fa-arrow-right text-slate-500 mr-2 text-xs"></i>{item.answer}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Comprehension Section */}
                                <div>
                                    <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center">
                                        <i className="fas fa-pen-fancy mr-2"></i> Part II: Comprehension
                                    </h3>
                                    <p className="text-xs text-slate-400 mb-4 italic">Click a question card below to highlight the evidence in the text.</p>

                                    <div className="space-y-5">
                                        {currentData.questions.map((q, index) => {
                                            const isActive = activeHighlight === q.id;
                                            
                                            return (
                                                <div 
                                                    key={q.id}
                                                    onClick={() => toggleHighlight(q.id)}
                                                    className={`answer-card bg-white rounded-2xl p-6 border-2 cursor-pointer transition-all ${isActive ? q.colorClass : 'border-slate-200 hover:border-indigo-300 hover:shadow-md'}`}
                                                >
                                                    {/* Question Header */}
                                                    <div className="flex items-start gap-3 mb-4">
                                                        <div className={`mt-1 flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${isActive ? q.bgColor + ' ' + q.iconColor : 'bg-slate-100 text-slate-500'}`}>
                                                            Q{index + 1}
                                                        </div>
                                                        <h4 className={`text-base font-semibold ${isActive ? 'text-slate-900' : 'text-slate-700'}`}>
                                                            {q.question}
                                                        </h4>
                                                    </div>

                                                    {/* Action Bar (Show/Hide Evidence) */}
                                                    <div className="pl-11 mb-4">
                                                        <span className={`inline-flex items-center text-xs font-bold uppercase tracking-wider ${isActive ? q.iconColor : 'text-slate-400'}`}>
                                                            <i className={`fas fa-search mr-1.5 ${isActive ? 'animate-pulse' : ''}`}></i> 
                                                            {isActive ? 'Evidence Shown' : 'Tap to find evidence'}
                                                        </span>
                                                    </div>

                                                    {/* Model Answer Box */}
                                                    <div className="pl-11">
                                                        <div className={`rounded-xl p-4 border relative ${isActive ? q.bgColor + ' border-transparent' : 'bg-slate-50 border-slate-100'}`}>
                                                            <div className="absolute -top-3 left-4 bg-white px-2 text-xs font-black uppercase tracking-widest text-indigo-600 shadow-sm border border-slate-100 rounded">
                                                                MODEL ANSWER
                                                            </div>
                                                            <p className="text-slate-700 font-medium text-sm leading-relaxed mt-2">
                                                                <i className="fas fa-quote-left text-slate-300 mr-2"></i>
                                                                {q.modelAnswer}
                                                            </p>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
